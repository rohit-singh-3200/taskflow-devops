{% extends "base.html" %}

{% block title %}
Login
{% endblock %}


{% block content %}

<div class="auth-card">

    <h1 class="login-title">Welcome Back</h1>

    <p>Sign in to continue to TaskFlow</p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p class="register-link">
        Don't have an account?
        <a href="{{ url_for('register') }}">Register</a>
    </p>

</div>

{% endblock %}
